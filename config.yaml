server:
  port: 8080

origin:
  url: "https://ap-1f485fa7eb6f4fbc8396f49e5eaf20f7.ecs.eu-central-1.on.aws"
  timeout: 30s
  protection:
    single_flight:
      enabled: true
    rate_limit:
      enabled: false
      rps: 100
      burst: 50
      timeout: 5s

cache:
  memory:
    max_size_mb: 2000
  disk:
    path: "./cache_data"
    max_size_mb: 2048
  default_ttl: 3600s

ttl_rules:
  - pattern: "image/*"
    ttl: 86400s
  - pattern: "text/html"
    ttl: 300s
  - pattern: "text/css"
    ttl: 86400s
  - pattern: "application/javascript"
    ttl: 86400s
  - pattern: "application/json"
    ttl: 60s
